<script>

document.querySelectorAll('.image-container img').forEach(image =>{
	image.onclick = () => {
		document.querySelector('.image-container .popup-imag').style.display = 'block';
		document.querySelector('.image-container .popup-imag img').src = image.getAttribute('src');
	}
});

document.querySelector('.image-container .popup-imag span').onclick = () => {
		document.querySelector('.image-container .popup-imag').style.display = 'none';
}
